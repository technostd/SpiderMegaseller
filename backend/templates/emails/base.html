<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Spider Megaseller{% endblock %}</title>
</head>
<body style="margin:0; padding:0; background:#f3f4f6; font-family:Arial, sans-serif;">
  <div style="max-width:680px; margin:0 auto; padding:24px;">
    <div style="background:#ffffff; border-radius:16px; padding:28px; border:1px solid #e5e7eb;">

      <div style="margin-bottom:24px;">
        <div style="font-size:22px; font-weight:bold; color:#059669;">
          Spider Megaseller
        </div>
        <div style="font-size:13px; color:#6b7280; margin-top:4px;">
          Автоматическое уведомление
        </div>
      </div>

      {% block content %}{% endblock %}

      <hr style="border:none; border-top:1px solid #e5e7eb; margin:28px 0;">

      <p style="font-size:12px; color:#6b7280; line-height:1.5;">
        Вы получили это письмо, потому что включены email-уведомления в Spider Megaseller.
      </p>

      <p style="font-size:12px; color:#6b7280; line-height:1.5;">
        Управлять уведомлениями можно в личном кабинете.
      </p>
    </div>
  </div>
</body>
</html>
